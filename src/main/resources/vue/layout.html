<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>SneakerShop</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="/images/favicon.png">

    <!-- Fonts -->
    <link rel="stylesheet" href="/webjars/roboto-fontface/0.10.0/css/roboto/roboto-fontface.css">
    <link rel="stylesheet" href="/webjars/mdi__font/7.4.47/css/materialdesignicons.min.css">
    <link rel="stylesheet" href="/webjars/font-awesome/6.7.2/css/all.min.css">

    <!-- Vuetify and SweetAlert Stylesheets -->
    <link rel="stylesheet" href="/webjars/vuetify/3.10.5/dist/vuetify.min.css">
    <link rel="stylesheet" href="/webjars/sweetalert2/11.22.2/dist/sweetalert2.min.css">

    <!-- Scripts -->
    <script src="/webjars/vue/3.5.22/dist/vue.global.prod.js"></script>
    <script src="/webjars/vuetify/3.10.5/dist/vuetify.min.js"></script>
    <script src="/webjars/sweetalert2/11.22.2/dist/sweetalert2.min.js"></script>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@3.10.5/dist/vuetify.min.js"></script>

    <script>
        //const { createVuetify } = Vuetify
        // const { es } = 'vuetify/locale'
        // console.log(es)
        // Create Vuetify Object
        const vuetify = Vuetify.createVuetify({
            theme: {
                themes: {
                    light: {
                        colors: {
                            background: '#F5F5F5',
                            primary: '#7986CB',
                            secondary: '#9575CD'
                        }
                    },
                    dark: {
                        colors: {
                            background: '#000000',
                            primary: '#7986CB',
                            secondary: '#9575CD'
                        }
                    },
                },
            },
        })
        // Create Vue Object App
        const app = Vue.createApp({})
    </script>
    <script src="js/util.js"></script>
    @componentRegistration
</head>

<body>
    <main id="main-vue" v-cloak>
        @routeComponent
    </main>
    <script type="module">
        app.use(vuetify).mount("#main-vue");
    </script>
</body>

</html>
